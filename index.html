<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner Intel — Condense by Zeliot</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F2ED;
    --ink: #1A1814;
    --ink-soft: #6B6660;
    --card-bg: #FFFFFF;
    --border: #E0DDD8;
    --tag-bg: #EDE9E3;
  }
  body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }
  header { padding: 48px 64px 32px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-end; }
  .logo-block h1 { font-family: 'DM Serif Display', serif; font-size: 28px; letter-spacing: -0.5px; line-height: 1; }
  .logo-block p { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-soft); margin-top: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .header-tag { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-soft); letter-spacing: 0.05em; text-transform: uppercase; text-align: right; line-height: 1.6; }
  main { max-width: 1100px; margin: 0 auto; padding: 48px 64px; }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
  .search-input { flex: 1; min-width: 200px; padding: 10px 16px; border: 1px solid var(--border); border-radius: 4px; background: var(--card-bg); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); outline: none; }
  .search-input:focus { border-color: var(--ink); }
  .filter-btn { padding: 10px 16px; border: 1px solid var(--border); border-radius: 4px; background: var(--card-bg); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; color: var(--ink-soft); transition: all 0.15s; }
  .filter-btn:hover, .filter-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .add-btn { padding: 10px 20px; border: 1px solid var(--ink); border-radius: 4px; background: var(--ink); color: #fff; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .add-btn:hover { background: #333; }

  /* Add partner modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card-bg); border-radius: 6px; padding: 32px; width: 420px; max-width: 90vw; }
  .modal h3 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 24px; }
  .modal label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); display: block; margin-bottom: 6px; }
  .modal input, .modal select { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); background: var(--bg); outline: none; margin-bottom: 16px; }
  .modal input:focus, .modal select:focus { border-color: var(--ink); }
  .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
  .modal-confirm { flex: 1; padding: 11px; background: var(--ink); color: #fff; border: none; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; }
  .modal-cancel { flex: 1; padding: 11px; background: transparent; color: var(--ink); border: 1px solid var(--border); border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; }

  /* Partner count */
  .list-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-soft); margin-bottom: 16px; letter-spacing: 0.05em; }

  /* Partner cards */
  .partners-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .partner-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; padding: 20px 24px; cursor: pointer; transition: all 0.2s ease; }
  .partner-card:hover { border-color: var(--ink); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
  .partner-card.active { border-color: var(--ink); grid-column: 1 / -1; transform: none; box-shadow: none; }
  .partner-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .partner-name { font-size: 15px; font-weight: 500; letter-spacing: -0.2px; }
  .partner-tags { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .tag { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-soft); background: var(--tag-bg); padding: 3px 8px; border-radius: 2px; letter-spacing: 0.04em; text-transform: uppercase; white-space: nowrap; }
  .tag.confluent { background: #FDE8E4; color: #C0290D; }
  .tag.databricks { background: #FFF0E8; color: #C04A10; }
  .tag.both { background: #E8EDF5; color: #2B4A8C; }
  .expand-icon { font-size: 18px; color: var(--ink-soft); transition: transform 0.2s ease; flex-shrink: 0; }
  .partner-card.active .expand-icon { transform: rotate(45deg); }

  .partner-content { display: none; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); }
  .partner-card.active .partner-content { display: block; }
  .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  .content-block h4 { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 12px; }
  .content-block p { font-size: 14px; line-height: 1.7; color: var(--ink); }
  .loading-state { display: flex; align-items: center; gap: 10px; color: var(--ink-soft); font-size: 13px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-state { color: #C0392B; font-size: 13px; font-family: 'DM Mono', monospace; }
  .approach-block { background: var(--tag-bg); border-radius: 4px; padding: 16px 20px; }

  .empty-state { text-align: center; padding: 64px; color: var(--ink-soft); font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.05em; }

  footer { text-align: center; padding: 32px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-soft); letter-spacing: 0.05em; border-top: 1px solid var(--border); margin-top: 48px; }
  @media (max-width: 768px) { header, main { padding: 32px 24px; } .content-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <h1>Partner Intel</h1>
    <p>Condense by Zeliot — GTM Intelligence</p>
  </div>
  <div class="header-tag">Ecosystem<br>Intelligence Map</div>
</header>

<main>
  <div class="toolbar">
    <input class="search-input" id="search" type="text" placeholder="Search partners…">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="confluent">Confluent</button>
    <button class="filter-btn" data-filter="databricks">Databricks</button>
    <button class="filter-btn" data-filter="both">Both</button>
    <button class="add-btn" id="openModal">+ Add Partner</button>
  </div>
  <div class="list-meta" id="list-meta"></div>
  <div class="partners-grid" id="partners-grid"></div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Add a Partner</h3>
    <label>Company Name</label>
    <input type="text" id="new-name" placeholder="e.g. Palantir">
    <label>Category</label>
    <input type="text" id="new-category" placeholder="e.g. Data Analytics">
    <label>Ecosystem</label>
    <select id="new-ecosystem">
      <option value="confluent">Confluent</option>
      <option value="databricks">Databricks</option>
      <option value="both">Both</option>
    </select>
    <div class="modal-actions">
      <button class="modal-cancel" id="closeModal">Cancel</button>
      <button class="modal-confirm" id="confirmAdd">Add Partner</button>
    </div>
  </div>
</div>

<footer>Built for Zeliot Partnerships — Powered by Claude</footer>

<script>
const CONDENSE_CONTEXT = `Condense is a streaming-native data platform by Zeliot that enables organizations to build and run domain-ready pipelines in real time within their own cloud using a BYOC (Bring Your Own Cloud) architecture. It eliminates data movement while ensuring full control and security. It provides prebuilt transforms and stateful streaming execution to process continuous event data with low latency. It uses a vCPU-hour pricing model so teams only pay for actual compute usage, making it a cost-efficient and production-grade alternative to traditional batch or micro-batch data systems.`;

let partners = [
  { name: "Snowflake", category: "Data Warehouse", ecosystem: "both" },
  { name: "MongoDB", category: "Database", ecosystem: "confluent" },
  { name: "Elastic", category: "Search & Analytics", ecosystem: "confluent" },
  { name: "Splunk", category: "Observability", ecosystem: "confluent" },
  { name: "dbt Labs", category: "Transformation", ecosystem: "both" },
  { name: "AWS", category: "Cloud", ecosystem: "both" },
  { name: "Google Cloud", category: "Cloud", ecosystem: "both" },
  { name: "Microsoft Azure", category: "Cloud", ecosystem: "both" },
  { name: "Fivetran", category: "Data Integration", ecosystem: "both" },
  { name: "Datadog", category: "Monitoring", ecosystem: "confluent" },
  { name: "HashiCorp", category: "Infrastructure", ecosystem: "confluent" },
  { name: "Tableau", category: "BI & Analytics", ecosystem: "databricks" },
  { name: "Power BI", category: "BI & Analytics", ecosystem: "databricks" },
  { name: "Informatica", category: "Data Management", ecosystem: "databricks" },
  { name: "Anomalo", category: "Data Quality", ecosystem: "databricks" },
  { name: "Atlan", category: "Data Catalog", ecosystem: "databricks" },
];

let activeCard = null;
const cache = {};
let currentFilter = 'all';
let currentSearch = '';

function ecosystemLabel(e) {
  if (e === 'confluent') return '<span class="tag confluent">Confluent</span>';
  if (e === 'databricks') return '<span class="tag databricks">Databricks</span>';
  return '<span class="tag both">Confluent + Databricks</span>';
}

function renderAll() {
  const grid = document.getElementById('partners-grid');
  const meta = document.getElementById('list-meta');
  activeCard = null;
  grid.innerHTML = '';

  const filtered = partners.filter(p => {
    const matchFilter = currentFilter === 'all' || p.ecosystem === currentFilter;
    const matchSearch = p.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                        p.category.toLowerCase().includes(currentSearch.toLowerCase());
    return matchFilter && matchSearch;
  });

  meta.textContent = filtered.length + ' partner' + (filtered.length !== 1 ? 's' : '');

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">No partners found. Try adjusting your search or filter.</div>';
    return;
  }

  filtered.forEach(partner => {
    const card = document.createElement('div');
    card.className = 'partner-card';
    card.innerHTML = `
      <div class="partner-top">
        <span class="partner-name">${partner.name}</span>
        <div class="partner-tags">
          <span class="tag">${partner.category}</span>
          ${ecosystemLabel(partner.ecosystem)}
          <span class="expand-icon">+</span>
        </div>
      </div>
      <div class="partner-content">
        <div class="content-grid">
          <div class="content-block">
            <h4>Partnership Overview</h4>
            <div class="overview-text"><div class="loading-state"><div class="spinner"></div>Fetching intelligence…</div></div>
          </div>
          <div class="content-block">
            <h4>Approach Strategy for Condense</h4>
            <div class="approach-block"><div class="loading-state"><div class="spinner"></div>Generating strategy…</div></div>
          </div>
        </div>
      </div>`;
    card.addEventListener('click', () => toggleCard(card, partner));
    grid.appendChild(card);
  });
}

async function toggleCard(card, partner) {
  if (card.classList.contains('active')) { card.classList.remove('active'); activeCard = null; return; }
  if (activeCard) activeCard.classList.remove('active');
  card.classList.add('active');
  activeCard = card;
  const cacheKey = partner.name + ':' + partner.ecosystem;
  if (cache[cacheKey]) { renderContent(card, cache[cacheKey]); return; }
  await fetchIntel(card, partner, cacheKey);
}

async function fetchIntel(card, partner, cacheKey) {
  const ecoLabel = partner.ecosystem === 'both' ? 'Confluent and Databricks' : (partner.ecosystem === 'confluent' ? 'Confluent' : 'Databricks');
  const prompt = `You are a B2B partnership intelligence assistant.\n\nContext about Condense by Zeliot:\n${CONDENSE_CONTEXT}\n\nTask: Provide two things about ${partner.name} as a partner in the ${ecoLabel} ecosystem:\n\n1. PARTNERSHIP_OVERVIEW: In 3-4 sentences, explain what the ${ecoLabel} + ${partner.name} partnership is about. What do they jointly offer? Who is the target customer? What is the integration or go-to-market angle?\n\n2. APPROACH_STRATEGY: In 3-4 sentences, give a specific, actionable strategy for how the Head of Partnerships at Zeliot should approach ${partner.name} to position Condense as complementary. What angle, what pain point, what hook?\n\nRespond ONLY in this JSON format, no markdown, no backticks:\n{"overview": "...", "strategy": "..."}`;
  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: prompt }] })
    });
    const data = await response.json();
    const text = data.content.map(i => i.text || "").join("").trim();
    const parsed = JSON.parse(text);
    cache[cacheKey] = parsed;
    renderContent(card, parsed);
  } catch(err) { renderError(card); }
}

function renderContent(card, data) {
  card.querySelector('.overview-text').innerHTML = '<p>' + data.overview + '</p>';
  card.querySelector('.approach-block').innerHTML = '<p>' + data.strategy + '</p>';
}

function renderError(card) {
  const msg = '<span class="error-state">Failed to load. Try clicking again.</span>';
  card.querySelector('.overview-text').innerHTML = msg;
  card.querySelector('.approach-block').innerHTML = msg;
}

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderAll();
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderAll();
});

// Modal
document.getElementById('openModal').addEventListener('click', () => {
  document.getElementById('modal').classList.add('open');
});
document.getElementById('closeModal').addEventListener('click', () => {
  document.getElementById('modal').classList.remove('open');
});
document.getElementById('confirmAdd').addEventListener('click', () => {
  const name = document.getElementById('new-name').value.trim();
  const category = document.getElementById('new-category').value.trim();
  const ecosystem = document.getElementById('new-ecosystem').value;
  if (!name) return;
  partners.unshift({ name, category: category || 'Partner', ecosystem });
  document.getElementById('new-name').value = '';
  document.getElementById('new-category').value = '';
  document.getElementById('modal').classList.remove('open');
  renderAll();
});

renderAll();
</script>
</body>
</html>
